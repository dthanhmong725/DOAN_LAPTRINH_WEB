<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huy hiệu - CyberForum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="/css/notification-bell.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">
      <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
    </a>
    <div style="flex: 1;"></div>
    <div class="user-menu" style="display: none; align-items: center; gap: 8px;">
      <button class="btn btn-ghost btn-icon" id="notificationBtn" title="Thông báo" style="position:relative;">
        <i class="ti ti-bell"></i>
      </button>
      <div style="position: relative;">
        <button class="btn btn-ghost btn-user" id="userMenuBtn">
          <div class="avatar avatar-sm user-avatar">U</div>
          <span class="user-name">Người dùng</span>
          <i class="ti ti-chevron-down" style="font-size: 0.75rem;"></i>
        </button>
        <div id="userDropdown" style="display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 6px; min-width: 160px; z-index: 1000;">
          <a href="/profile.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;"><i class="ti ti-user"></i> Hồ sơ</a>
          <a href="/settings.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;"><i class="ti ti-settings"></i> Cài đặt</a>
          <a href="javascript:void(0)" data-action="logout" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px; color: var(--accent-red);"><i class="ti ti-logout"></i> Đăng xuất</a>
        </div>
      </div>
    </div>
    <div class="auth-buttons">
      <a href="/login.html" class="btn btn-ghost btn-nav">Đăng nhập</a>
      <a href="/register.html" class="btn btn-primary btn-nav">Đăng ký</a>
    </div>
  </nav>

  <main style="padding-top: calc(var(--navbar-height) + 24px);">
    <div class="container">
      <h1 style="margin-bottom: 8px; display: flex; align-items: center; gap: 10px;">
        <i class="ti ti-medal" style="color: var(--accent);"></i>
        Huy hiệu
      </h1>
      <p class="text-muted mb-4" style="margin-bottom: 20px;">Kiếm huy hiệu bằng cách tham gia cộng đồng. Huy hiệu được trao tự động dựa trên hoạt động của bạn.</p>

      <div id="badgesGrid" class="d-flex" style="gap: 16px; flex-wrap: wrap;">
        <div class="skeleton" style="width: 180px; height: 140px;"></div>
        <div class="skeleton" style="width: 180px; height: 140px;"></div>
        <div class="skeleton" style="width: 180px; height: 140px;"></div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/role-guard.js"></script>
  <script src="/js/notification-bell.js"></script>
  <script src="/js/message-bell.js"></script>
  <script src="/js/theme-manager.js"></script>
  <script src="/js/site.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await AuthManager.restoreSession();
      AuthManager.updateUI();
      if (typeof NotificationBell !== 'undefined' && AuthManager.isAuthenticated()) {
        NotificationBell._initialized = false;
        NotificationBell.init();
      }
      const userMenuBtn = document.getElementById('userMenuBtn');
      const userDropdown = document.getElementById('userDropdown');
      if (userMenuBtn) {
        userMenuBtn.addEventListener('click', (e) => { e.stopPropagation(); userDropdown.style.display = userDropdown.style.display === 'none' ? 'block' : 'none'; });
      }
      document.addEventListener('click', () => { if (userDropdown) userDropdown.style.display = 'none'; });
      document.querySelectorAll('[data-action="logout"]').forEach(btn => {
        btn.addEventListener('click', (e) => { e.preventDefault(); AuthManager.logout(); });
      });
      await loadBadges();
    });

    async function loadBadges() {
      try {
        const result = await API.badges.getAll();
        renderBadges(result.data);
      } catch (error) { console.error('Lỗi tải huy hiệu:', error); }
    }

    function renderBadges(badges) {
      const container = document.getElementById('badgesGrid');
      container.innerHTML = badges.map(badge => `
        <div class="card" style="width: 180px; text-align: center; ${!badge.isEarned ? 'opacity: 0.45;' : ''}">
          <div style="width: 56px; height: 56px; margin: 0 auto 12px; border-radius: 50%; background: ${badge.color}18; display: flex; align-items: center; justify-content: center;">
            <i class="ti ti-${getBadgeIcon(badge.icon)}" style="font-size: 1.5rem; color: ${badge.color};"></i>
          </div>
          <h3 style="font-size: 0.875rem; margin-bottom: 4px;">${badge.name}</h3>
          <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.4;">${badge.description || 'Không có mô tả'}</p>
          ${badge.isEarned ? `
            <div class="badge badge-success mt-2">
              <i class="ti ti-check"></i> Đã đạt được
              ${badge.earnedAt ? `<span style="margin-left: 4px;">${formatDate(badge.earnedAt)}</span>` : ''}
            </div>
          ` : `
            <div class="badge mt-2" style="background: var(--bg-surface2); color: var(--text-muted);">
              <i class="ti ti-lock"></i> Chưa có
            </div>
          `}
        </div>
      `).join('');
    }

    function getBadgeIcon(icon) {
      const icons = { 'file-text': 'file-text', 'star': 'star', 'award': 'award', 'shield': 'shield', 'thumbs-up': 'thumb-up', 'heart': 'heart', 'crown': 'crown', 'bookmark': 'bookmark', 'moon': 'moon', 'trophy': 'trophy' };
      return icons[icon] || 'medal';
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString('vi-VN');
    }
  </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
