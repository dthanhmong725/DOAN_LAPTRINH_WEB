<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý file - CyberForum</title>
  <meta http-equiv="refresh" content="0;url=/create-post.html">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/notification-bell.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">
      <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
    </a>
    <a href="/" class="btn btn-ghost" style="margin-left: 12px;">
      <i class="ti ti-arrow-left"></i> Quay lại
    </a>
  </nav>
  <main style="padding-top: calc(var(--navbar-height) + 40px);">
    <div class="container" style="max-width: 600px; text-align: center;">
      <div class="card" style="padding: 40px;">
        <i class="ti ti-info-circle" style="font-size: 3rem; color: var(--accent); margin-bottom: 16px; display: block;"></i>
        <h2 style="margin-bottom: 12px;">Trang này đã được tích hợp</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;">
          Tính năng upload tài liệu hiện đã được tích hợp trực tiếp vào trang
          <strong>Tạo bài viết</strong> và <strong>Sửa bài viết</strong>.
          Bạn có thể đính kèm tài liệu (PDF, hình ảnh, video, file code...) ngay khi viết bài.
        </p>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
          <a href="/create-post.html" class="btn btn-primary">
            <i class="ti ti-edit"></i> Tạo bài viết mới
          </a>
          <a href="/profile.html" class="btn btn-secondary">
            <i class="ti ti-arrow-left"></i> Về trang cá nhân
          </a>
        </div>
        <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 20px; margin-bottom: 0;">
          Đang chuyển hướng tự động...
        </p>
      </div>
    </div>
  </main>
  <script>
    setTimeout(() => { window.location.href = '/create-post.html'; }, 3000);
  </script>
</body>
</html>
