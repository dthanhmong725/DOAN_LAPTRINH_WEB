<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng xếp hạng - CyberForum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="/css/notification-bell.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">
      <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
    </a>
    <div style="flex: 1;"></div>
    <div class="user-menu" style="display: none; align-items: center; gap: 8px;">
      <button class="btn btn-ghost btn-icon" id="notificationBtn" title="Thông báo" style="position:relative;">
        <i class="ti ti-bell"></i>
      </button>
      <div style="position: relative;">
        <button class="btn btn-ghost btn-user" id="userMenuBtn">
          <div class="avatar avatar-sm user-avatar">U</div>
          <span class="user-name">Người dùng</span>
          <i class="ti ti-chevron-down" style="font-size: 0.75rem;"></i>
        </button>
        <div id="userDropdown" style="display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 6px; min-width: 160px; z-index: 1000;">
          <a href="/profile.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;"><i class="ti ti-user"></i> Hồ sơ</a>
          <a href="/settings.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;"><i class="ti ti-settings"></i> Cài đặt</a>
          <a href="javascript:void(0)" data-action="logout" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px; color: var(--accent-red);"><i class="ti ti-logout"></i> Đăng xuất</a>
        </div>
      </div>
    </div>
    <div class="auth-buttons">
      <a href="/login.html" class="btn btn-ghost btn-nav">Đăng nhập</a>
      <a href="/register.html" class="btn btn-primary btn-nav">Đăng ký</a>
    </div>
  </nav>

  <main style="padding-top: calc(var(--navbar-height) + 24px);">
    <div class="container" style="max-width: 720px;">
      <h1 style="margin-bottom: 8px; display: flex; align-items: center; gap: 10px;">
        <i class="ti ti-trophy" style="color: var(--accent);"></i>
        Bảng xếp hạng
      </h1>
      <p class="text-muted mb-4" style="margin-bottom: 20px;">Những thành viên tích cực nhất cộng đồng dựa trên điểm uy tín.</p>

      <div id="leaderboardList">
        <div class="skeleton" style="height: 72px; margin-bottom: 8px;"></div>
        <div class="skeleton" style="height: 72px; margin-bottom: 8px;"></div>
        <div class="skeleton" style="height: 72px;"></div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/role-guard.js"></script>
  <script src="/js/notification-bell.js"></script>
  <script src="/js/theme-manager.js"></script>
  <script src="/js/site.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await AuthManager.restoreSession();
      AuthManager.updateUI();
      if (typeof NotificationBell !== 'undefined' && AuthManager.isAuthenticated()) {
        NotificationBell._initialized = false;
        NotificationBell.init();
      }
      // User dropdown toggle
      const userMenuBtn = document.getElementById('userMenuBtn');
      const userDropdown = document.getElementById('userDropdown');
      if (userMenuBtn) {
        userMenuBtn.addEventListener('click', (e) => { e.stopPropagation(); userDropdown.style.display = userDropdown.style.display === 'none' ? 'block' : 'none'; });
      }
      document.addEventListener('click', () => { if (userDropdown) userDropdown.style.display = 'none'; });
      document.querySelectorAll('[data-action="logout"]').forEach(btn => {
        btn.addEventListener('click', (e) => { e.preventDefault(); AuthManager.logout(); });
      });
      await loadLeaderboard();
    });

    async function loadLeaderboard() {
      try {
        const result = await API.users.getLeaderboard({ page: 1, pageSize: 50 });
        renderLeaderboard(result.data);
      } catch (error) { console.error('Lỗi tải bảng xếp hạng:', error); }
    }

    function renderLeaderboard(users) {
      const container = document.getElementById('leaderboardList');

      if (!users || !users.length) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="ti ti-trophy" style="font-size: 3rem; color: var(--accent); display: block; margin-bottom: 12px;"></i>
            <h3>Chưa có dữ liệu</h3>
            <p>Hãy là người đầu tiên tích lũy điểm uy tín!</p>
          </div>`;
        return;
      }

      container.innerHTML = users.map((entry) => {
        const name = entry.user.displayName || entry.user.username;
        const initial = name.charAt(0).toUpperCase();
        const rankIcon = entry.rank === 1 ? '🥇' : entry.rank === 2 ? '🥈' : entry.rank === 3 ? '🥉' : `#${entry.rank}`;
        const rankColor = getRankColor(entry.rank);
        const rankBg = getRankBg(entry.rank);
        const isTop3 = entry.rank <= 3;

        return `
          <div style="
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: var(--bg-surface);
            border: 1px solid ${isTop3 ? rankColor + '33' : 'var(--border)'};
            border-radius: var(--radius-md);
            transition: all 0.2s;
            ${isTop3 ? `box-shadow: 0 0 12px ${rankColor}15;` : ''}
          "
          onmouseover="this.style.borderColor='${isTop3 ? rankColor + '66' : 'rgba(0,229,160,0.3)'}'; this.style.transform='translateX(3px)';"
          onmouseout="this.style.borderColor='${isTop3 ? rankColor + '33' : 'var(--border)'}'; this.style.transform='none';">
            <!-- Rank -->
            <div style="
              width: 44px;
              height: 44px;
              border-radius: 50%;
              background: ${rankBg};
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: ${isTop3 ? '1.4rem' : '0.9rem'};
              font-weight: 700;
              color: ${rankColor};
              flex-shrink: 0;
            ">${rankIcon}</div>

            <!-- Avatar -->
            <div style="
              width: 42px;
              height: 42px;
              border-radius: 50%;
              background: linear-gradient(135deg, var(--accent-dark), var(--accent));
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 700;
              color: #0a0c10;
              font-size: 1rem;
              flex-shrink: 0;
              box-shadow: 0 2px 8px rgba(0,229,160,0.2);
            ">${initial}</div>

            <!-- Info -->
            <div style="flex: 1; min-width: 0;">
              <a href="/profile.html?username=${entry.user.username}" style="
                font-weight: 600;
                font-size: 0.9375rem;
                color: var(--text-primary);
                text-decoration: none;
                display: block;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
              ">${name}</a>
              <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                <span class="rank-badge rank-${(entry.user.rank || '').toLowerCase()}">${entry.user.rank || 'Member'}</span>
                <span style="font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
                  <i class="ti ti-file-text"></i> ${entry.postCount} bài
                </span>
              </div>
            </div>

            <!-- Score -->
            <div style="text-align: right; flex-shrink: 0;">
              <div style="font-size: 1.375rem; font-weight: 800; color: ${isTop3 ? rankColor : 'var(--accent)'};">${entry.reputationPoints.toLocaleString('vi-VN')}</div>
              <div style="font-size: 0.6875rem; color: var(--text-muted); margin-top: 2px;">điểm uy tín</div>
            </div>
          </div>`;
      }).join('');
    }

    function getRankColor(rank) {

      if (rank === 1) return '#FFD700';
      if (rank === 2) return '#C0C0C0';
      if (rank === 3) return '#CD7F32';
      return 'var(--text-muted)';
    }

    function getRankBg(rank) {
      if (rank === 1) return 'rgba(255,215,0,0.12)';
      if (rank === 2) return 'rgba(192,192,192,0.12)';
      if (rank === 3) return 'rgba(205,127,50,0.12)';
      return 'var(--bg-surface2)';
    }
  </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
