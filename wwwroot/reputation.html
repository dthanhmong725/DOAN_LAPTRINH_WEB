<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm uy tín - CyberForum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/notification-bell.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">
      <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
    </a>
    <a href="/" class="btn btn-ghost" style="margin-left: 12px;">
      <i class="ti ti-arrow-left"></i> Quay lại
    </a>
    <div style="flex: 1;"></div>
    <div class="user-menu" style="display: none; align-items: center; gap: 8px;">
      <button class="btn btn-ghost btn-icon" id="notificationBtn" title="Thông báo" style="position:relative;">
        <i class="ti ti-bell"></i>
      </button>
    </div>
  </nav>

  <main style="padding-top: calc(var(--navbar-height) + 20px); padding-bottom: 40px;">
    <div class="container" style="max-width: 1100px;">
      <!-- Header -->
      <div style="margin-bottom: 24px;">
        <h1 style="font-size: 1.6rem; display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
          <i class="ti ti-star" style="color: var(--accent);"></i>
          Điểm uy tín
        </h1>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0;">
          Theo dõi điểm uy tín và lịch sử hoạt động của bạn trên diễn đàn
        </p>
      </div>

      <!-- Stat cards -->
      <div id="statCards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px;">
        <div class="skeleton" style="height: 100px; border-radius: var(--radius-md);"></div>
        <div class="skeleton" style="height: 100px; border-radius: var(--radius-md);"></div>
        <div class="skeleton" style="height: 100px; border-radius: var(--radius-md);"></div>
        <div class="skeleton" style="height: 100px; border-radius: var(--radius-md);"></div>
      </div>

      <!-- Tabs -->
      <div class="card" style="padding: 0; margin-bottom: 20px; overflow: hidden;">
        <div style="display: flex; border-bottom: 1px solid var(--border);">
          <button class="rep-tab active" data-tab="history" style="
            padding: 12px 20px; background: none; border: none; cursor: pointer;
            font-size: 0.9rem; font-weight: 500; color: var(--accent);
            border-bottom: 2px solid var(--accent);">
            <i class="ti ti-history"></i> Lịch sử điểm
          </button>
          <button class="rep-tab" data-tab="rules" style="
            padding: 12px 20px; background: none; border: none; cursor: pointer;
            font-size: 0.9rem; font-weight: 500; color: var(--text-muted);
            border-bottom: 2px solid transparent;">
            <i class="ti ti-info-circle"></i> Quy tắc cộng điểm
          </button>
          <button class="rep-tab" data-tab="leaderboard" style="
            padding: 12px 20px; background: none; border: none; cursor: pointer;
            font-size: 0.9rem; font-weight: 500; color: var(--text-muted);
            border-bottom: 2px solid transparent;">
            <i class="ti ti-trophy"></i> Bảng xếp hạng
          </button>
        </div>

        <!-- History tab -->
        <div id="tab-history" class="rep-tab-content" style="padding: 20px;">
          <div id="historyList"></div>
          <div id="historyPagination" class="pagination" style="margin-top: 16px;"></div>
        </div>

        <!-- Rules tab -->
        <div id="tab-rules" class="rep-tab-content" style="padding: 20px; display: none;">
          <div id="rulesContent"></div>
        </div>

        <!-- Leaderboard tab -->
        <div id="tab-leaderboard" class="rep-tab-content" style="padding: 20px; display: none;">
          <div id="leaderboardList"></div>
          <div id="leaderboardPagination" class="pagination" style="margin-top: 16px;"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/role-guard.js"></script>
  <script src="/js/notification-bell.js"></script>
  <script src="/js/site.js"></script>
  <script src="/js/theme-manager.js"></script>
  <script src="/js/sidebar-toggle.js"></script>

  <script>
    const ReputationPage = {
      currentTab: 'history',
      historyPage: 1,
      leaderboardPage: 1,

      async init() {
        await AuthManager.restoreSession();
        if (!AuthManager.requireAuth()) return;
        AuthManager.updateUI();
        if (typeof NotificationBell !== 'undefined' && AuthManager.isAuthenticated()) {
          NotificationBell._initialized = false;
          NotificationBell.init();
        }
        RoleGuard.applyVisibility();
        this.setupTabs();
        await this.loadSummary();
        await this.loadHistory(1);
        await this.loadRules();
        await this.loadLeaderboard(1);
      },

      setupTabs() {
        document.querySelectorAll('.rep-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.rep-tab').forEach(t => {
              t.classList.remove('active');
              t.style.color = 'var(--text-muted)';
              t.style.borderBottomColor = 'transparent';
            });
            tab.classList.add('active');
            tab.style.color = 'var(--accent)';
            tab.style.borderBottomColor = 'var(--accent)';
            document.querySelectorAll('.rep-tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';
            this.currentTab = tab.dataset.tab;
          });
        });
      },

      async loadSummary() {
        try {
          const user = AuthManager.getUser();
          if (!user) return;
          const result = await API.reputation.getUser(user.id);
          if (!result.success) {
            document.getElementById('statCards').innerHTML = `<p style="color: var(--accent-red);">${result.message || 'Lỗi tải thông tin'}</p>`;
            return;
          }
          const r = result.data;
          const rankClass = r.rank ? r.rank.toLowerCase() : 'newbie';
          document.getElementById('statCards').innerHTML = `
            <div class="card" style="padding: 16px;">
              <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Tổng điểm</div>
              <div style="font-size: 1.75rem; font-weight: 700; color: var(--accent);">${(r.totalPoints || 0).toLocaleString('vi-VN')}</div>
              <div style="margin-top: 6px;">
                <span class="rank-badge rank-${rankClass}"><i class="ti ti-shield"></i> ${r.rank || 'Newbie'}</span>
              </div>
            </div>
            <div class="card" style="padding: 16px;">
              <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Bài viết tháng này</div>
              <div style="font-size: 1.75rem; font-weight: 700;">${r.postsThisMonth || 0}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;">+5 điểm mỗi bài</div>
            </div>
            <div class="card" style="padding: 16px;">
              <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Bình luận tháng này</div>
              <div style="font-size: 1.75rem; font-weight: 700;">${r.commentsThisMonth || 0}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;">+2 điểm mỗi bình luận</div>
            </div>
            <div class="card" style="padding: 16px;">
              <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Lượt vote</div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.25rem; color: var(--accent);"><i class="ti ti-arrow-up"></i> ${r.upvotesReceived || 0}</span>
                <span style="font-size: 1.25rem; color: var(--accent-red);"><i class="ti ti-arrow-down"></i> ${r.downvotesReceived || 0}</span>
              </div>
            </div>
          `;
        } catch (e) {
          console.error('loadSummary', e);
        }
      },

      async loadHistory(page) {
        this.historyPage = page;
        const list = document.getElementById('historyList');
        list.innerHTML = `<div class="nb-loading"><div class="nb-spinner"></div></div>`;
        try {
          const result = await API.reputation.getMy({ page, pageSize: 20 });
          if (!result.success) {
            list.innerHTML = `<p style="color: var(--accent-red);">${result.message || 'Lỗi'}</p>`;
            return;
          }
          const items = result.data || [];
          if (!items.length) {
            list.innerHTML = `<div class="nb-empty"><i class="ti ti-history-off"></i><span>Chưa có lịch sử điểm uy tín</span><span style="font-size:0.75rem;">Hãy đăng bài và bình luận để tích lũy điểm!</span></div>`;
            document.getElementById('historyPagination').innerHTML = '';
            return;
          }
          list.innerHTML = items.map(item => this.renderHistoryItem(item)).join('');
          this.renderPagination(result, 'historyPagination', (p) => this.loadHistory(p));
        } catch (e) {
          list.innerHTML = `<p style="color: var(--accent-red);">Lỗi tải lịch sử</p>`;
        }
      },

      renderHistoryItem(item) {
        const isPositive = item.pointsChange > 0;
        const isNegative = item.pointsChange < 0;
        const sign = isPositive ? '+' : '';
        const color = isPositive ? 'var(--accent)' : isNegative ? 'var(--accent-red)' : 'var(--text-muted)';
        return `
          <div style="display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border);">
            <div style="width: 40px; height: 40px; border-radius: 50%; background: ${item.color}22; color: ${item.color}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
              <i class="ti ${item.icon || 'ti-star'}"></i>
            </div>
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 0.9rem; font-weight: 500;">${item.actionLabel || item.action}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                <span><i class="ti ti-clock"></i> ${formatTimeAgo(item.createdAt)}</span>
                ${item.postTitle ? `<span>•</span><a href="/post.html?id=${item.postId}" style="color: var(--accent-blue); text-decoration: none;">${item.postTitle.substring(0, 40)}${item.postTitle.length > 40 ? '...' : ''}</a>` : ''}
                ${item.actorName ? `<span>• bởi ${item.actorName}</span>` : ''}
              </div>
            </div>
            <div style="text-align: right; flex-shrink: 0;">
              <div style="font-size: 1rem; font-weight: 700; color: ${color};">${sign}${item.pointsChange}</div>
              <div style="font-size: 0.7rem; color: var(--text-muted);">Tổng: ${item.totalPointsAfter}</div>
            </div>
          </div>
        `;
      },

      async loadRules() {
        try {
          const result = await API.reputation.getRules();
          if (!result.success) return;
          const rules = result.data.rules || [];
          const ranks = result.data.ranks || [];
          const container = document.getElementById('rulesContent');
          container.innerHTML = `
            <h3 style="font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
              <i class="ti ti-coin" style="color: var(--accent);"></i> Quy tắc cộng/trừ điểm
            </h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-bottom: 24px;">
              ${rules.map(r => `
                <div style="padding: 12px 14px; background: var(--bg-surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;">
                  <div style="width: 36px; height: 36px; border-radius: 50%; background: ${r.color}22; color: ${r.color}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <i class="ti ${r.icon}"></i>
                  </div>
                  <div style="flex: 1; min-width: 0;">
                    <div style="font-weight: 500; font-size: 0.875rem;">${r.action}</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">${r.description}</div>
                  </div>
                  <div style="font-size: 1rem; font-weight: 700; color: ${r.color};">${r.points > 0 ? '+' : ''}${r.points}</div>
                </div>
              `).join('')}
            </div>
            <h3 style="font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
              <i class="ti ti-crown" style="color: var(--accent);"></i> Các cấp bậc
            </h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
              ${ranks.map(rk => `
                <div style="padding: 12px; background: var(--bg-surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); text-align: center;">
                  <div style="width: 40px; height: 40px; border-radius: 50%; background: ${rk.color}22; color: ${rk.color}; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px;">
                    <i class="ti ${rk.icon}"></i>
                  </div>
                  <div style="font-weight: 600; font-size: 0.875rem;">${rk.name}</div>
                  <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;">≥ ${rk.minPoints.toLocaleString('vi-VN')} điểm</div>
                </div>
              `).join('')}
            </div>
          `;
        } catch (e) {
          console.error('loadRules', e);
        }
      },

      async loadLeaderboard(page) {
        this.leaderboardPage = page;
        const list = document.getElementById('leaderboardList');
        list.innerHTML = `<div class="nb-loading"><div class="nb-spinner"></div></div>`;
        try {
          const result = await API.reputation.getLeaderboard({ page, pageSize: 20 });
          if (!result.success) {
            list.innerHTML = `<p style="color: var(--accent-red);">${result.message || 'Lỗi'}</p>`;
            return;
          }
          const items = result.data || [];
          if (!items.length) {
            list.innerHTML = `<div class="nb-empty"><i class="ti ti-trophy-off"></i><span>Chưa có dữ liệu xếp hạng</span></div>`;
            return;
          }
          list.innerHTML = items.map((entry, i) => {
            const rankColor = entry.rank === 1 ? '#ffd700' : entry.rank === 2 ? '#c0c0c0' : entry.rank === 3 ? '#cd7f32' : 'var(--text-muted)';
            const rankIcon = entry.rank <= 3 ? 'ti-trophy' : 'ti-medal';
            return `
              <div style="display: flex; align-items: center; gap: 12px; padding: 10px 0; ${i < items.length - 1 ? 'border-bottom: 1px solid var(--border);' : ''}">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: ${rankColor}22; color: ${rankColor}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  ${entry.rank <= 3 ? `<i class="ti ${rankIcon}"></i>` : `<span style="font-weight: 700; font-size: 0.875rem;">${entry.rank}</span>`}
                </div>
                <span class="avatar avatar-sm">${(entry.user.displayName || entry.user.username).charAt(0).toUpperCase()}</span>
                <div style="flex: 1; min-width: 0;">
                  <a href="/profile.html?username=${entry.user.username}" style="color: var(--text-primary); text-decoration: none; font-weight: 500;">${entry.user.displayName || entry.user.username}</a>
                  <div style="font-size: 0.75rem; color: var(--text-muted);">@${entry.user.username}</div>
                </div>
                <span class="rank-badge rank-${(entry.user.rank || 'newbie').toLowerCase()}">${entry.user.rank || 'Newbie'}</span>
                <div style="min-width: 90px; text-align: right;">
                  <div style="font-weight: 700; color: var(--accent); font-size: 0.95rem;">${(entry.reputationPoints || 0).toLocaleString('vi-VN')}</div>
                  <div style="font-size: 0.7rem; color: var(--text-muted);">${entry.postCount || 0} bài · ${entry.commentCount || 0} bình luận</div>
                </div>
              </div>
            `;
          }).join('');
          this.renderPagination(result, 'leaderboardPagination', (p) => this.loadLeaderboard(p));
        } catch (e) {
          list.innerHTML = `<p style="color: var(--accent-red);">Lỗi tải bảng xếp hạng</p>`;
        }
      },

      renderPagination(result, containerId, onClick) {
        const container = document.getElementById(containerId);
        const totalPages = Math.ceil(result.totalItems / result.pageSize);
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        const current = result.page;
        let html = '';
        if (current > 1) html += `<button class="pagination-btn" data-page="${current - 1}"><i class="ti ti-chevron-left"></i></button>`;
        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= current - 1 && i <= current + 1)) {
            html += `<button class="pagination-btn ${i === current ? 'active' : ''}" data-page="${i}">${i}</button>`;
          } else if (i === current - 2 || i === current + 2) {
            html += `<span style="color: var(--text-muted); padding: 0 4px;">...</span>`;
          }
        }
        if (current < totalPages) html += `<button class="pagination-btn" data-page="${current + 1}"><i class="ti ti-chevron-right"></i></button>`;
        container.innerHTML = html;
        container.querySelectorAll('button[data-page]').forEach(btn => {
          btn.addEventListener('click', () => onClick(parseInt(btn.dataset.page)));
        });
      }
    };

    function formatTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);
      if (seconds < 60) return 'vài giây trước';
      if (seconds < 3600) return `${Math.floor(seconds / 60)} phút trước`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)} giờ trước`;
      if (seconds < 604800) return `${Math.floor(seconds / 86400)} ngày trước`;
      return date.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    document.addEventListener('DOMContentLoaded', () => ReputationPage.init());
  </script>
</body>
</html>
