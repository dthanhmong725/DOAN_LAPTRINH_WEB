<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đổi mật khẩu - CyberForum</title>
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="/css/password-strength.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary);">
  <div style="width: 100%; max-width: 440px; padding: 24px;">
    <div class="text-center mb-4">
      <a href="/" style="font-size: 2rem; color: var(--accent); text-decoration: none;">
        <i class="ti ti-shield" style="font-size: 2.5rem;"></i>
      </a>
      <h1 style="font-size: 1.375rem; margin-top: 12px;">Đổi mật khẩu</h1>
      <p class="text-muted" style="font-size: 0.875rem;">Cập nhật mật khẩu mới cho tài khoản của bạn</p>
    </div>

    <div id="successView" class="card text-center" style="display: none; padding: 40px 24px;">
      <div style="margin-bottom: 16px;">
        <i class="ti ti-check" style="font-size: 3rem; color: var(--accent);"></i>
      </div>
      <h2 style="font-size: 1.125rem; margin-bottom: 12px;">Đổi mật khẩu thành công!</h2>
      <p class="text-muted" style="font-size: 0.875rem; margin-bottom: 12px;">
        Mật khẩu của bạn đã được cập nhật.
      </p>
      <a href="/" class="btn btn-primary w-100" style="margin-top: 8px;">Về trang chủ</a>
    </div>

    <form id="changePasswordForm" class="card">
      <div class="form-group">
        <label class="form-label">Mật khẩu hiện tại</label>
        <div class="pw-input-wrapper">
          <input type="password" name="currentPassword" id="currentPassword" class="form-input"
                 placeholder="Nhập mật khẩu hiện tại" required style="padding-right: 40px;">
          <i class="ti ti-lock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
          <button type="button" id="toggleCurrent" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mật khẩu mới</label>
        <div class="pw-input-wrapper">
          <input type="password" name="newPassword" id="newPasswordInput" class="form-input"
                 placeholder="Tạo mật khẩu mạnh" required minlength="8"
                 data-strength-check style="padding-right: 40px;">
          <i class="ti ti-lock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
          <button type="button" id="toggleNew" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;">
            <i class="ti ti-eye"></i>
          </button>
        </div>
        <div data-strength-check id="strengthContainer"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Xác nhận mật khẩu mới</label>
        <div class="pw-input-wrapper">
          <input type="password" name="confirmPassword" id="confirmNewInput" class="form-input"
                 placeholder="Nhập lại mật khẩu mới" required
                 style="padding-right: 40px; padding-left: 40px;">
          <i class="ti ti-lock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
          <button type="button" id="toggleConfirm" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;">
            <i class="ti ti-eye"></i>
          </button>
        </div>
        <div class="pw-confirm-container" style="margin-top: 6px;"></div>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="submitBtn" style="padding: 11px;">
        <span class="btn-text">
          <i class="ti ti-key" style="margin-right: 6px;"></i>
          Đổi mật khẩu
        </span>
        <span class="loading-spinner" style="display: none;"></span>
      </button>

      <div id="errorMessage" class="form-error mt-3" style="display: none;"></div>
    </form>

    <p class="text-center mt-3 text-muted" style="font-size: 0.8125rem; margin-top: 16px;">
      <a href="/" class="text-muted" style="text-decoration: none;">
        <i class="ti ti-arrow-left" style="font-size: 0.75rem;"></i> Quay lại trang chủ
      </a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/password-strength.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await AuthManager.restoreSession();
      if (!AuthManager.requireAuth()) return;

      const currentPwInput = document.getElementById('currentPassword');
      const newPwInput = document.getElementById('newPasswordInput');
      const confirmInput = document.getElementById('confirmNewInput');
      const submitBtn = document.getElementById('submitBtn');
      const strengthContainer = document.getElementById('strengthContainer');
      const form = document.getElementById('changePasswordForm');
      const errorDiv = document.getElementById('errorMessage');

      const confirmContainerEl = confirmInput
        ? (confirmInput.parentElement.querySelector('.pw-confirm-container') || (() => {
            const el = document.createElement('div');
            el.className = 'pw-confirm-container';
            el.style.marginTop = '6px';
            confirmInput.insertAdjacentElement('afterend', el);
            return el;
          })())
        : null;

      const mgr = new PasswordStrengthManager({
        passwordInput: newPwInput,
        confirmInput: confirmInput,
        strengthContainer,
        confirmContainer: confirmContainerEl,
        submitBtn,
        minScore: 2,
        debounceMs: 100
      });
      mgr.init();

      function setupToggle(btnId, inputId) {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        if (!btn || !input) return;
        btn.addEventListener('click', () => {
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          btn.innerHTML = `<i class="ti ti-eye${isPassword ? '-off' : ''}"></i>`;
        });
      }
      setupToggle('toggleCurrent', 'currentPassword');
      setupToggle('toggleNew', 'newPasswordInput');
      setupToggle('toggleConfirm', 'confirmNewInput');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (newPwInput.value !== confirmInput.value) {
          Toast.show('Mật khẩu mới không khớp', 'error');
          return;
        }
        const strength = PasswordStrengthChecker.checkLocally(newPwInput.value);
        if (strength.score < 2) {
          Toast.show('Mật khẩu mới chưa đủ mạnh. Vui lòng kiểm tra lại.', 'warning');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.querySelector('.btn-text').innerHTML = '<span class="loading-spinner" style="display: inline-block; margin-right: 6px;"></span> Đang xử lý...';
        errorDiv.style.display = 'none';

        try {
          const formData = new FormData(form);
          const data = {
            currentPassword: formData.get('currentPassword'),
            newPassword: formData.get('newPassword'),
            confirmPassword: formData.get('confirmPassword')
          };

          const result = await API.auth.changePassword(data);
          if (result.success) {
            form.style.display = 'none';
            document.getElementById('successView').style.display = 'block';
          } else {
            errorDiv.textContent = result.message || 'Không thể đổi mật khẩu';
            errorDiv.style.display = 'block';
          }
        } catch (error) {
          errorDiv.textContent = error.message || 'Có lỗi xảy ra';
          errorDiv.style.display = 'block';
        } finally {
          submitBtn.disabled = false;
          submitBtn.querySelector('.btn-text').innerHTML = '<i class="ti ti-key" style="margin-right: 6px;"></i> Đổi mật khẩu';
        }
      });
    });
  </script>
</body>
</html>
